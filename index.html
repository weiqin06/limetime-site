<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LimeTime</title>
<style>
  :root { --ink:#1a2b22; --muted:#5c6b63; --accent:#2f9e44; --line:#e3ece6; --bg:#ffffff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); line-height:1.7; }
  .wrap { max-width:620px; margin:0 auto; padding:72px 22px 80px; text-align:center; }
  .brand { font-size:40px; font-weight:800; color:var(--accent); letter-spacing:-0.6px; }
  .tag { color:var(--muted); font-size:17px; margin-top:6px; }
  .links { margin-top:40px; display:flex; flex-direction:column; gap:12px; align-items:stretch; }
  .links a { display:block; padding:15px 18px; border:1px solid var(--line); border-radius:12px; text-decoration:none; color:var(--ink); font-weight:600; background:#f5f9f6; }
  .links a:hover { border-color:var(--accent); }
  footer { margin-top:48px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">LimeTime</div>
  <div class="tag">Bank the time, spend it well. · 把时间存起来，明智地花。</div>
  <div class="links">
    <a href="privacy/">Privacy Policy (English)</a>
    <a href="privacy/zh/">隐私政策（简体中文）</a>
    <a href="support/">Support / 支持</a>
  </div>
  <footer>© 2026 LimeTime · <a href="mailto:weiqin06@gmail.com" style="color:var(--muted)">weiqin06@gmail.com</a></footer>
</div>
</body>
</html>
